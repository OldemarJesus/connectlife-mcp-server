name: CI — lint, type-check, test, security

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      - name: Install the project
        run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests

  type-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      - name: Install the project
        run: pip install -e ".[dev]"
      - run: pyright

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      - name: Install the project
        run: pip install -e ".[dev]"
      - run: pytest --cov-report=xml
      - uses: codecov/codecov-action@0565863a31f2c772f9f0395006fa163f3f94fbb7 # v5
        if: matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      - name: Install the project
        run: pip install -e ".[dev]"
      - run: bandit -r src/connectlife_mcp
